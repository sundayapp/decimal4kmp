name: Release

on:
  push:
    paths:
      - 'CHANGELOG.md'
    branches:
      - main
      - hotfix/**

jobs:
  release:
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64/image=${{ vars.GHA_IMAGE }}/spot=false/family=${{ vars.GHA_RUNNER_FAMILY }}/env=${{ vars.GHA_ENVIRONMENT }}/volume=${{ vars.GHA_RUNNER_DISK_SIZE }}/extras=s3-cache
    if: ${{ startsWith(github.ref_name, 'main') || startsWith(github.ref_name, 'hotfix') }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_GITHUB_ID }}
          private-key: ${{ secrets.APP_GITHUB_PRIVATE_KEY }}

      - name: Release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate_token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          path: ${{ inputs.path }}
